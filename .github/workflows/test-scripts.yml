name: Test Scripts
on:
  pull_request:
    paths: ['.github/scripts/**']
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test '.github/scripts/*.test.mjs'
