name: Process Theme Update

on:
  repository_dispatch:
    types: [theme-update]
  push:
    branches: [master]
    paths: ['index.json']
  workflow_dispatch:

concurrency:
  group: vendor-${{ github.event.client_payload.repo || github.event_name }}
  cancel-in-progress: false

jobs:
  # Job for repository_dispatch events (theme updates from harmonizer)
  update:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate payload
        id: payload
        run: |
          REPO="${{ github.event.client_payload.repo }}"
          COMMIT="${{ github.event.client_payload.commit }}"

          if [ -z "$REPO" ] || [ -z "$COMMIT" ]; then
            echo "error=Missing repo or commit in payload" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Check theme is registered
        id: check-registered
        run: |
          REPO="${{ steps.payload.outputs.repo }}"

          if ! jq -e --arg repo "$REPO" '.themes[] | select(.repo == $repo)' index.json > /dev/null; then
            echo "error=Theme $REPO is not registered in index.json" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Theme $REPO is registered"

      - name: Clone theme repo
        id: clone
        run: |
          REPO="${{ steps.payload.outputs.repo }}"
          COMMIT="${{ steps.payload.outputs.commit }}"

          git clone "https://github.com/$REPO.git" theme-repo
          cd theme-repo
          git checkout "$COMMIT"
          cd ..

          echo "Cloned $REPO at $COMMIT"

      - name: Get theme metadata
        id: metadata
        run: |
          THEME_ID=$(jq -r '.id' theme-repo/metadata.json)
          VERSION=$(jq -r '.version' theme-repo/metadata.json)

          echo "id=$THEME_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version increment
        id: version-check
        run: |
          REPO="${{ steps.payload.outputs.repo }}"
          THEME_ID="${{ steps.metadata.outputs.id }}"
          NEW_VERSION="${{ steps.metadata.outputs.version }}"

          # Get current version from the theme's own build.json
          CURRENT_VERSION=$(jq -r '.version // "0.0.0"' "themes/$THEME_ID/build.json" 2>/dev/null || echo "0.0.0")

          echo "Current version: $CURRENT_VERSION"
          echo "New version: $NEW_VERSION"

          # Compare versions using semver
          if ! npx semver "$NEW_VERSION" -r ">$CURRENT_VERSION" > /dev/null 2>&1; then
            echo "error=Version $NEW_VERSION is not greater than $CURRENT_VERSION" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Version check passed: $CURRENT_VERSION -> $NEW_VERSION"

      - name: Validate theme
        id: validate
        run: |
          OUTPUT=$(NO_COLOR=1 npx create-bl-theme@latest validate theme-repo 2>&1 | sed 's/\x1b\[[0-9;]*m//g')
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -qi "error\|failed"; then
            echo "error=Theme validation failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Vendor theme
        id: vendor
        run: |
          THEME_ID="${{ steps.metadata.outputs.id }}"
          VERSION="${{ steps.metadata.outputs.version }}"
          REPO="${{ steps.payload.outputs.repo }}"
          COMMIT="${{ steps.payload.outputs.commit }}"
          MIN_VERSION=$(jq -r '.minVersion // empty' theme-repo/metadata.json)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Stash the outgoing flat build (its files, excluding any existing v/
          # snapshots) so we can preserve it as a snapshot if the new minVersion
          # raised the floor. The builds script decides whether we keep it.
          rm -rf .outgoing
          if [ -d "themes/$THEME_ID" ]; then
            mkdir -p .outgoing
            cp -r "themes/$THEME_ID/." .outgoing/
            rm -rf .outgoing/v
          fi

          # Replace the flat build with the new files. Preserve the existing v/
          # snapshot directory and the discussion resolver's data across the swap
          # (snapshots are pruned separately; discussion.json is owned by another
          # workflow and must never be dropped by vendoring).
          rm -rf .vsnapshots .discussion.json
          [ -d "themes/$THEME_ID/v" ] && mv "themes/$THEME_ID/v" .vsnapshots
          [ -f "themes/$THEME_ID/discussion.json" ] && mv "themes/$THEME_ID/discussion.json" .discussion.json
          rm -rf "themes/$THEME_ID"
          mkdir -p "themes/$THEME_ID"
          [ -d .vsnapshots ] && mv .vsnapshots "themes/$THEME_ID/v"
          [ -f .discussion.json ] && mv .discussion.json "themes/$THEME_ID/discussion.json"

          # Copy essential files
          cp theme-repo/metadata.json "themes/$THEME_ID/"
          [ -f theme-repo/style.rics ] && cp theme-repo/style.rics "themes/$THEME_ID/"
          [ -f theme-repo/style.css ] && cp theme-repo/style.css "themes/$THEME_ID/"
          [ -f theme-repo/shader.json ] && cp theme-repo/shader.json "themes/$THEME_ID/"
          [ -f theme-repo/settings.json ] && cp theme-repo/settings.json "themes/$THEME_ID/"
          [ -f theme-repo/DESCRIPTION.md ] && cp theme-repo/DESCRIPTION.md "themes/$THEME_ID/"
          [ -f theme-repo/cover.png ] && cp theme-repo/cover.png "themes/$THEME_ID/"
          [ -d theme-repo/images ] && cp -r theme-repo/images "themes/$THEME_ID/"

          # Latest integrity is computed over the flat build only, pruning v/ so
          # the latest hash does not change when snapshots come and go.
          INTEGRITY=$(find "themes/$THEME_ID" -path "themes/$THEME_ID/v" -prune -o -type f -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1)

          # Prior reachable builds[] for this theme, read from its OLD build.json
          # (stashed in .outgoing/ above). Empty array if absent. NOTE: .outgoing
          # must stay populated until this read; clearing it earlier would silently
          # reset the build staircase to [].
          PRIOR_BUILDS=$(jq -c '.builds // []' .outgoing/build.json 2>/dev/null || echo '[]')

          # The stash is theme content only; build.json/discussion.json are registry
          # metadata, not part of a version snapshot.
          rm -f .outgoing/build.json .outgoing/discussion.json

          # Compute the new builds[], whether to snapshot the outgoing build, and
          # which old snapshot dirs to prune.
          PLAN=$(node .github/scripts/builds.mjs "$THEME_ID" "$VERSION" "$MIN_VERSION" "sha256-$INTEGRITY" "$PRIOR_BUILDS")
          echo "Build plan: $PLAN"

          BUILDS=$(echo "$PLAN" | jq -c '.builds')

          # Materialize the snapshot of the outgoing build, if any.
          SNAP_PATH=$(echo "$PLAN" | jq -r '.snapshot.path // empty')
          if [ -n "$SNAP_PATH" ] && [ -d .outgoing ]; then
            mkdir -p "$SNAP_PATH"
            cp -r .outgoing/. "$SNAP_PATH/"
          fi

          # Prune snapshot dirs that fell off the reachable staircase.
          echo "$PLAN" | jq -r '.deletions[]' | while IFS= read -r dir; do
            [ -n "$dir" ] && rm -rf "$dir"
          done

          rm -rf .outgoing

          # Write this theme's own build.json. The aggregate lockfile is
          # regenerated from these per-theme files by a separate workflow.
          jq -n --arg repo "$REPO" --arg id "$THEME_ID" --arg v "$VERSION" \
            --arg c "$COMMIT" --arg i "sha256-$INTEGRITY" --arg t "$TIMESTAMP" \
            --argjson b "$BUILDS" \
            '{repo:$repo,id:$id,version:$v,commit:$c,integrity:$i,locked:$t,builds:$b}' \
            > "themes/$THEME_ID/build.json"

          echo "Vendored $THEME_ID v$VERSION"

      # https://github.com/planetscale/ghcommit-action/issues/43#issuecomment-2313129696
      - name: Stage all changes
        id: stage
        run: |
          rm -rf theme-repo
          git add .
          git diff --staged --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        id: commit
        continue-on-error: true
        if: steps.stage.outputs.has_changes == 'true'
        uses: planetscale/ghcommit-action@v0.2.19
        with:
          commit_message: "feat(${{ steps.metadata.outputs.id }}): update to v${{ steps.metadata.outputs.version }}"
          repo: ${{ github.repository }}
          branch: master
          file_pattern: themes/${{ steps.metadata.outputs.id }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # The commit step uses continue-on-error, so ALL commit failures (not just
      # CAS races) flow into this bounded retry. ghcommit exposes no
      # machine-readable way to tell a race from a real error, so we treat every
      # failure as a possible race; the 5-retry cap bounds the blast radius.
      - name: Re-dispatch on commit race
        id: redispatch
        if: steps.commit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RETRY=${{ github.event.client_payload.retry || 0 }}
          REPO="${{ steps.payload.outputs.repo }}"
          COMMIT="${{ steps.payload.outputs.commit }}"
          INSTALL_ID="${{ github.event.client_payload.installationId }}"
          if [ "$RETRY" -lt 5 ]; then
            sleep $((RANDOM % 20 + 5))   # jitter so the colliding window clears
            if curl -sS --fail-with-body -X POST "https://api.github.com/repos/${{ github.repository }}/dispatches" \
                 -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/vnd.github+json" \
                 -d "{\"event_type\":\"theme-update\",\"client_payload\":{\"repo\":\"$REPO\",\"commit\":\"$COMMIT\",\"installationId\":$INSTALL_ID,\"retry\":$((RETRY+1))}}"; then
              echo "requeued=true" >> "$GITHUB_OUTPUT"
              echo "Commit raced; re-dispatched as retry $((RETRY+1))/5"
            else
              echo "Re-dispatch POST failed; not requeued"
              exit 1
            fi
          else
            echo "Commit raced and retries exhausted ($RETRY)"
            exit 1
          fi

      - name: Report success status
        if: steps.commit.outcome == 'success'
        run: |
          curl -X POST "${{ secrets.STORE_API_URL }}/api/webhooks/complete" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo": "${{ steps.payload.outputs.repo }}",
              "commit": "${{ steps.payload.outputs.commit }}",
              "installationId": ${{ github.event.client_payload.installationId }},
              "success": true,
              "description": "Published v${{ steps.metadata.outputs.version }}",
              "targetUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Report failure status
        if: failure() && steps.redispatch.outputs.requeued != 'true'
        run: |
          curl -X POST "${{ secrets.STORE_API_URL }}/api/webhooks/complete" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo": "${{ steps.payload.outputs.repo }}",
              "commit": "${{ steps.payload.outputs.commit }}",
              "installationId": ${{ github.event.client_payload.installationId }},
              "success": false,
              "description": "${{ steps.check-registered.outputs.error || steps.version-check.outputs.error || steps.validate.outputs.error || 'Update failed' }}",
              "targetUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

  # Job for push events (new themes added via PR merge)
  vendor-new:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get theme changes
        id: changes
        run: |
          # Get repos from index.json
          jq -r '.themes[].repo' index.json | sort > index_repos.txt

          # Get already-vendored repos from the per-theme build.json files (the
          # vendored source of truth). Empty when the registry has no themes yet.
          find themes -mindepth 2 -maxdepth 2 -name build.json -exec jq -r '.repo' {} + 2>/dev/null | sort > lock_repos.txt

          # Find new themes (in index.json but not in lockfile)
          NEW_THEMES=$(comm -23 index_repos.txt lock_repos.txt)

          # Find removed themes (in lockfile but not in index.json)
          REMOVED_THEMES=$(comm -13 index_repos.txt lock_repos.txt)

          echo "new<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_THEMES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "removed<<EOF" >> $GITHUB_OUTPUT
          echo "$REMOVED_THEMES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -n "$NEW_THEMES" ]; then
            echo "New themes to vendor:"
            echo "$NEW_THEMES"
          fi

          if [ -n "$REMOVED_THEMES" ]; then
            echo "Themes to remove:"
            echo "$REMOVED_THEMES"
          fi

      - name: Vendor new themes
        id: vendor
        if: steps.changes.outputs.new != ''
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VENDORED=""
          FAILED=""

          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Vendoring: $repo"

            if ! git clone --depth 1 "https://github.com/$repo.git" theme-repo 2>&1; then
              echo "::error::Failed to clone $repo"
              FAILED="$FAILED$repo\n"
              continue
            fi

            cd theme-repo
            COMMIT=$(git rev-parse HEAD)
            cd ..

            THEME_ID=$(jq -r '.id' theme-repo/metadata.json)
            VERSION=$(jq -r '.version' theme-repo/metadata.json)
            MIN_VERSION=$(jq -r '.minVersion // empty' theme-repo/metadata.json)

            # Validate theme
            OUTPUT=$(NO_COLOR=1 npx create-bl-theme@latest validate theme-repo 2>&1 | sed 's/\x1b\[[0-9;]*m//g')
            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -qi "error\|failed"; then
              echo "::error::Validation failed for $repo"
              FAILED="$FAILED$repo\n"
              rm -rf theme-repo
              continue
            fi

            # Create vendor directory
            rm -rf "themes/$THEME_ID"
            mkdir -p "themes/$THEME_ID"

            # Copy essential files
            cp theme-repo/metadata.json "themes/$THEME_ID/"
            [ -f theme-repo/style.rics ] && cp theme-repo/style.rics "themes/$THEME_ID/"
            [ -f theme-repo/style.css ] && cp theme-repo/style.css "themes/$THEME_ID/"
            [ -f theme-repo/shader.json ] && cp theme-repo/shader.json "themes/$THEME_ID/"
            [ -f theme-repo/settings.json ] && cp theme-repo/settings.json "themes/$THEME_ID/"
            [ -f theme-repo/DESCRIPTION.md ] && cp theme-repo/DESCRIPTION.md "themes/$THEME_ID/"
            [ -f theme-repo/cover.png ] && cp theme-repo/cover.png "themes/$THEME_ID/"
            [ -d theme-repo/images ] && cp -r theme-repo/images "themes/$THEME_ID/"

            # Latest integrity over the flat build, pruning v/ (a brand-new
            # theme has none yet, but keep the rule consistent with updates).
            INTEGRITY=$(find "themes/$THEME_ID" -path "themes/$THEME_ID/v" -prune -o -type f -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1)

            # Initialize builds[] with the single new build (no prior builds, so
            # no snapshot and nothing to prune).
            PLAN=$(node .github/scripts/builds.mjs "$THEME_ID" "$VERSION" "$MIN_VERSION" "sha256-$INTEGRITY" "[]")
            BUILDS=$(echo "$PLAN" | jq -c '.builds')

            # Write this theme's own build.json (a brand-new theme has no prior
            # builds). The aggregate lockfile is regenerated from these
            # per-theme files by a separate workflow.
            jq -n --arg repo "$repo" --arg id "$THEME_ID" --arg v "$VERSION" \
              --arg c "$COMMIT" --arg i "sha256-$INTEGRITY" --arg t "$TIMESTAMP" \
              --argjson b "$BUILDS" \
              '{repo:$repo,id:$id,version:$v,commit:$c,integrity:$i,locked:$t,builds:$b}' \
              > "themes/$THEME_ID/build.json"

            VENDORED="$VENDORED$THEME_ID (v$VERSION)\n"

            rm -rf theme-repo
          done <<< "${{ steps.changes.outputs.new }}"

          echo "vendored<<EOF" >> $GITHUB_OUTPUT
          echo -e "$VENDORED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "failed<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FAILED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Fail if any themes failed to vendor
          if [ -n "$FAILED" ]; then
            echo "::error::Some themes failed to vendor"
            exit 1
          fi

      - name: Remove old themes
        id: cleanup
        if: steps.changes.outputs.removed != ''
        run: |
          REMOVED=""

          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Removing: $repo"

            # Find the theme ID by scanning the per-theme build.json files for
            # the one whose .repo matches the removed repo (robust to zero
            # matches: THEME_ID stays empty).
            THEME_ID=$(find themes -mindepth 2 -maxdepth 2 -name build.json -exec sh -c 'jq -e --arg r "$1" ".repo == \$r" "$2" >/dev/null 2>&1 && jq -r .id "$2"' _ "$repo" {} \;)

            if [ -n "$THEME_ID" ] && [ "$THEME_ID" != "null" ]; then
              # Remove vendored files (this drops the theme's build.json and
              # discussion.json along with the rest of its directory).
              if [ -d "themes/$THEME_ID" ]; then
                rm -rf "themes/$THEME_ID"
                echo "Removed themes/$THEME_ID"
              fi

              REMOVED="$REMOVED$THEME_ID\n"
            fi
          done <<< "${{ steps.changes.outputs.removed }}"

          echo "removed<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REMOVED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # https://github.com/planetscale/ghcommit-action/issues/43#issuecomment-2313129696
      - name: Stage all changes
        id: stage
        if: steps.vendor.outputs.vendored != '' || steps.cleanup.outputs.removed != ''
        run: |
          rm -f index_repos.txt lock_repos.txt
          rm -rf theme-repo
          git add .
          git diff --staged --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.stage.outputs.has_changes == 'true'
        uses: planetscale/ghcommit-action@v0.2.19
        with:
          commit_message: "chore: vendor themes"
          repo: ${{ github.repository }}
          branch: master
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Summary
        if: always()
        continue-on-error: true
        run: |
          echo "## Theme Vendoring Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VENDORED="${{ steps.vendor.outputs.vendored }}"
          REMOVED="${{ steps.cleanup.outputs.removed }}"
          FAILED="${{ steps.vendor.outputs.failed }}"

          if [ -n "$VENDORED" ]; then
            echo "### Vendored Themes" >> $GITHUB_STEP_SUMMARY
            echo "$VENDORED" | while IFS= read -r theme; do
              [ -n "$theme" ] && echo "- $theme" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$REMOVED" ]; then
            echo "### Removed Themes" >> $GITHUB_STEP_SUMMARY
            echo "$REMOVED" | while IFS= read -r theme; do
              [ -n "$theme" ] && echo "- $theme" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$FAILED" ]; then
            echo "### Failed Themes" >> $GITHUB_STEP_SUMMARY
            echo "$FAILED" | while IFS= read -r theme; do
              [ -n "$theme" ] && echo "- $theme" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "$VENDORED" ] && [ -z "$REMOVED" ] && [ -z "$FAILED" ]; then
            echo "No theme changes detected." >> $GITHUB_STEP_SUMMARY
          fi
